// ===== APEX LEGENDS: ULTIMATE MAX FPS CONFIG =====
// เน้นลดภาระ CPU ขีดสุด สำหรับสายแข่งฮาร์ดคอร์

// --- 1. การประมวลผล (Threading & CPU) ---
mat_queue_mode "2"           // บังคับให้เกมรันแบบ Multi-thread เต็มรูปแบบ
r_threaded_particles "1"     // แยกการคำนวณเอฟเฟกต์ฝุ่นควันไปประมวลผลต่างหาก
host_thread_mode "1"

// --- 2. แสงและเงา (Lighting & Shadows) ---
mat_disablehbao "1"          // ปิดเงาสะท้อนตกกระทบแบบสมบูรณ์
shadow_maxdynamic "0"        // ปิดเงาแบบเรียลไทม์ (เงาคนวิ่ง)
csm_enabled "0"              // ปิดระบบเงาจากแสงอาทิตย์
csm_coverage "0"
csm_cascade_res "0"
r_dynamic "0"                // ปิดแสงสะท้อนตามสภาพแวดล้อม
fog_enable "0"               // ปิดหมอกในแมพ

// --- 3. ระยะการมองเห็นและโมเดล (LOD & Details) ---
r_lod_switch_scale "0"       // บังคับให้โมเดลตึกและสิ่งของระยะไกลกลายเป็นดินน้ำมัน
cl_detaildist "0"            // ปิดการเรนเดอร์รายละเอียดเล็กๆ บนพื้น
cl_detailfade "0"
building_cubemaps "0"        // ปิดเงาสะท้อนกระจกบนตึก

// --- 4. เอฟเฟกต์และอนุภาค (Particles & FX) ---
cl_particle_fallback_base "3"
cl_particle_fallback_multiplier "2"
cl_particle_limiter_max_particle_count "8" // จำกัดจำนวนอนุภาค (สะเก็ดไฟ/ฝุ่น) ให้น้อยที่สุด
cl_particle_limiter_max_system_count "8"
cl_muzzleflash_dlight_st "0" // ปิดแสงแฟลชสว่างจ้าเวลาสาดกระสุน
cl_ejectbrass "0"            // ปิดแอนิเมชันปลอกกระสุนกระเด็นออกจากปืน
cl_new_impact_effects "0"    // ปิดเอฟเฟกต์ฝุ่นกระจายเวลาเจาะกำแพง
fx_draw "1"                  // ***บังคับเปิด 1 ไว้ เพื่อให้ยังมองเห็นควัน Bangalore และแก๊ส Caustic***

// --- 5. ระบบฟิสิกส์ ซากศพ และร่องรอย (Ragdolls, Ropes, Decals) ---
cl_disable_ragdolls "1"      // ปิดฟิสิกส์ศพ
cl_ragdoll_maxcount "0"      // ให้จำนวนศพที่แสดงผลบนจอเท่ากับ 0
cl_ragdoll_self_collision "0"
cl_gib_allow "0"             // ปิดชิ้นส่วนระเบิดกระจาย
rope_smooth "0"              // ปิดความนุ่มนวลของสาย Zipline (เส้นสลิงจะเหลี่ยมๆ)
rope_wind_dist "0"           // ปิดไม่ให้เส้นสลิงแกว่งตามลม
rope_subdiv "0"              // ปิดการแบ่งข้อต่อสลิง (ลดภาระซีพียูได้ดีมาก)
r_drawbatchdecals "0"        // ปิดรอยกระสุนและรอยเลือดแบบกลุ่ม
r_decals "0"                 // ปิดรอยกระสุนทั้งหมด

// --- 6. แอนิเมชันและโครงสร้างตัวละคร (Animations & Bones) ---
cl_SetupAllBones "0"         // ไม่ต้องคำนวณกระดูกตัวละครทุกชิ้น
cl_bones_incremental_blend "1"
cl_jiggle_bone_framerate_cutoff "0" // ปิดระบบฟิสิกส์เด้งดึ๋งของเสื้อผ้า/กระเป๋า
cl_anim_detail_dist "1"
cl_anim_face_dist "1"        // ปิดการขยับใบหน้าของตัวละครในระยะไกล
cl_cull_weapon_fx "0"

// --- 7. เมาส์และหน้าจอ (Input & Sync) ---
m_rawinput "1"               // อ่านค่าเมาส์ตรงจากฮาร์ดแวร์โดยไม่ผ่าน Windows (เมาส์คมขึ้น)
m_filter "0"                 // ปิดระบบทำเมาส์สมูท (ลด Input Lag)
mat_vsync_mode "0"           // ปิด Vsync เด็ดขาด
mat_backbuffer_count "1"
fps_max "162"                // ล็อค FPS ไว้ที่ 144 เพื่อไม่ให้ซีพียูทำงานหนักจนเกินไปและทำให้เฟรมไทม์นิ่งที่สุด
// --- 8. ปิดเงาแสงสะท้อนบนตัวปืนตอนขยับ ---
viewmodel_selfshadow "0"
viewmodel_cast_shadows "0"

// --- 10. ชุดคำสั่งทางลัด CPU (SIMD Optimization) ---
// บังคับให้ CPU ใช้ชุดคำสั่งพิเศษ (SIMD) ในการคำนวณโครงกระดูกและการเคลื่อนไหว (ช่วยลดคอขวด CPU เก่าได้ดีมาก)
cl_use_simd_bones "1"
cl_simdbones_slerp "1"

// --- 11. ปิดการส่งข้อมูลสถิติหลังบ้าน (Telemetry & Tracking) ---
// ปิดไม่ให้เกมแอบส่งข้อมูล สถิติ หรือ Log การเล่นของเรากลับไปที่เซิร์ฟเวอร์ EA (ลดการใช้ CPU และเน็ตเวิร์คเบื้องหลัง)
pin_opt_in "0"
telemetry_client_enable "0"
telemetry_client_sendInterval "0"

// --- 12. ปิดระบบเลือดขั้นเด็ดขาด (Extreme Violence Disable) ---
// ปิดละอองเลือดและชิ้นส่วนเนื้อเวลาที่ยิงโดนศัตรู (ลดการเกิดของ Particles กะทันหันตอนบวก)
violence_hblood "0"
violence_hgibs "0"
violence_agibs "0"
violence_ablood "0"

// --- 13. ลดคุณภาพแสงของเอฟเฟกต์และการบังวัตถุ (Z-Culling & FX) ---
// บังคับให้เอฟเฟกต์ไม่ตอบสนองต่อแสงอาทิตย์ และห้ามระบบคำนวณสิ่งที่ถูกกำแพงบังอยู่เด็ดขาด
r_particle_lighting_enable "0"
r_particle_low_res_enable "1"
r_fastzreject "1"
